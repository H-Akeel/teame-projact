<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>تسجيل دخول الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
:root {
  --bg: #080b14; --surface: #0d1120; --border: rgba(255,255,255,0.08);
  --accent: #e8c76a; --accent2: #b89430;
  --text: #edf0f7; --muted: #64748b; --danger: #f87171;
  --font: 'Cairo', sans-serif; --body: 'Tajawal', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--body); background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* animated bg */
.bg {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 55% at 50% 20%, rgba(232,199,106,.07) 0%, transparent 65%),
    radial-gradient(ellipse 45% 40% at 15% 85%, rgba(91,141,238,.06) 0%, transparent 55%);
}

/* floating orbs */
.orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
  animation: drift 14s ease-in-out infinite;
}
.orb1 { width:340px; height:340px; background:rgba(232,199,106,.045); top:-80px; right:-60px; animation-delay:0s; }
.orb2 { width:260px; height:260px; background:rgba(91,141,238,.04); bottom:-60px; left:-40px; animation-delay:-6s; }
.orb3 { width:200px; height:200px; background:rgba(52,211,153,.03); top:40%; left:60%; animation-delay:-10s; }
@keyframes drift {
  0%,100% { transform: translate(0,0) scale(1); }
  33%  { transform: translate(20px,-20px) scale(1.04); }
  66%  { transform: translate(-15px,15px) scale(.97); }
}

/* card */
.card {
  position: relative; z-index: 1;
  background: rgba(13,17,32,.9); border: 1px solid var(--border);
  border-radius: 22px; padding: 46px 42px;
  width: 100%; max-width: 410px;
  backdrop-filter: blur(24px);
  box-shadow: 0 28px 90px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.04);
}

/* logo */
.logo-wrap { text-align: center; margin-bottom: 36px; }
.logo-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 68px; height: 68px; border-radius: 18px;
  background: linear-gradient(135deg, rgba(232,199,106,.18), rgba(232,199,106,.06));
  border: 1px solid rgba(232,199,106,.2);
  font-size: 2rem; margin-bottom: 14px;
}
.logo-wrap h1 { font-family: var(--font); font-size: 1.35rem; font-weight: 900; }
.logo-wrap h1 span { color: var(--accent); }
.logo-wrap p  { font-size: .8rem; color: var(--muted); margin-top: 5px; }

/* divider */
.divider {
  display: flex; align-items: center; gap: 12px; margin-bottom: 26px;
  font-size: .72rem; color: var(--muted);
}
.divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }

/* field */
.field { margin-bottom: 18px; }
.field label { display: block; font-family: var(--font); font-size: .78rem; font-weight: 700; color: var(--muted); margin-bottom: 7px; }
.field-wrap { position: relative; }
.field-wrap .fi { position: absolute; top: 50%; right: 14px; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
.field input {
  width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px 12px 14px; padding-right: 40px;
  color: var(--text); font-family: var(--body); font-size: .9rem; outline: none;
  transition: border-color .2s, background .2s;
}
.field input:focus { border-color: var(--accent); background: rgba(232,199,106,.04); }
.field input::placeholder { color: var(--muted); }

/* error */
.err { min-height: 18px; font-size: .8rem; color: var(--danger); font-family: var(--font); font-weight: 600; text-align: center; margin: -6px 0 10px; }

/* submit */
.btn {
  width: 100%; padding: 13px; border-radius: 11px; border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: var(--bg); font-family: var(--font); font-size: .95rem; font-weight: 800;
  cursor: pointer; transition: all .25s; margin-top: 4px;
  position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg,rgba(255,255,255,.12),transparent);
  opacity: 0; transition: opacity .25s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,199,106,.35); }
.btn:hover::after { opacity: 1; }
.btn:active { transform: translateY(0); }

/* back */
.back { display: block; text-align: center; margin-top: 22px; color: var(--muted); font-size: .8rem; text-decoration: none; transition: color .2s; }
.back:hover { color: var(--accent); }

/* shake anim */
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
.shake { animation: shake .4s ease; }
</style>
</head>
<body>

<div class="bg"></div>
<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="card" id="card">
  <div class="logo-wrap">
    <div class="logo-icon">🔐</div>
    <h1>مركز <span>الملفات</span></h1>
    <p>تسجيل الدخول — خاص بالإدارة فقط</p>
  </div>

  <div class="divider">بيانات الدخول</div>

  <div class="field">
    <label>اسم المستخدم</label>
    <div class="field-wrap">
      <span class="fi">👤</span>
      <input type="text" id="u" placeholder="أدخل اسم المستخدم" autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>
  </div>

  <div class="field">
    <label>كلمة المرور</label>
    <div class="field-wrap">
      <span class="fi">🔑</span>
      <input type="password" id="p" placeholder="أدخل كلمة المرور"/>
    </div>
  </div>

  <div class="err" id="err"></div>

  <button class="btn" id="btn">دخول إلى لوحة التحكم ←</button>
  <a href="index.html" class="back">← العودة للموقع الرئيسي</a>
</div>

<script>
// ═══════════════════════════════════════
//  بيانات الأدمن — غيّرها من هنا
// ═══════════════════════════════════════
const ADMINS = [
  { user: 'admin', pass: 'admin123', name: 'المدير العام' },
];
const SESSION_KEY = 'malaff_session';

// entrance animation
gsap.from('#card', { opacity:0, y:32, scale:.96, duration:.65, ease:'power2.out' });

// login logic
function doLogin() {
  const u = document.getElementById('u').value.trim();
  const p = document.getElementById('p').value;
  const err = document.getElementById('err');

  if (!u || !p) { showErr('يرجى إدخال اسم المستخدم وكلمة المرور'); return; }

  const match = ADMINS.find(a => a.user === u && a.pass === p);

  if (!match) {
    showErr('❌ اسم المستخدم أو كلمة المرور غير صحيحة');
    document.getElementById('card').classList.add('shake');
    setTimeout(() => document.getElementById('card').classList.remove('shake'), 400);
    document.getElementById('p').value = '';
    return;
  }

  // save session
  sessionStorage.setItem(SESSION_KEY, JSON.stringify({ name: match.name, ts: Date.now() }));

  // success animation then redirect
  gsap.to('#card', {
    opacity:0, y:-20, scale:.97, duration:.4, ease:'power2.in',
    onComplete: () => { window.location.href = 'admin.html'; }
  });
}

function showErr(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  gsap.from(el, { opacity:0, y:-4, duration:.25 });
}

document.getElementById('btn').addEventListener('click', doLogin);
document.getElementById('p').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('u').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('p').focus(); });

// clear error on type
['u','p'].forEach(id => document.getElementById(id).addEventListener('input', () => { document.getElementById('err').textContent = ''; }));
</script>
</body>
</html>
